name: Build WebAPK (TWA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-twa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @google/bubblewrap

      - name: Initialize & Build TWA
        run: |
          echo "================================================================"
          echo "Building WebAPK for maximum performance via Trusted Web Activity"
          echo "Target URL: https://loki-x-prime.vercel.app"
          echo ""
          echo "Note: Bubblewrap requires an interactive setup locally first to"
          echo "generate a 'twa-manifest.json' and a signing key (keystore)."
          echo "Once generated, commit 'twa-manifest.json' to your repo and"
          echo "store the keystore in GitHub Secrets to fully automate this."
          echo ""
          echo "Example automated build command:"
          echo "bubblewrap build --manifest=twa-manifest.json"
          echo "================================================================"

