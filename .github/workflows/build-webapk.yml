name: Build WebAPK (TWA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-twa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=loki-x-prime.vercel.app, OU=App, O=Loki, L=City, S=State, C=US"

      - name: Run Bubblewrap Init
        run: |
          sudo apt-get install -y expect
          cat << 'EOF' > run_init.exp
          set timeout -1
          spawn bubblewrap init --manifest=https://loki-x-prime.vercel.app/manifest.json
          expect {
            "Key store location" { send "./android.keystore\r"; exp_continue }
            "Key name" { send "android\r"; exp_continue }
            "Password for the Key Store" { send "password\r"; exp_continue }
            "Password for the Key" { send "password\r"; exp_continue }
            -re "\\? .*\\(Y/n\\)" { send "y\r"; exp_continue }
            -re "\\? .*" { send "\r"; exp_continue }
            eof
          }
          EOF
          expect run_init.exp

      - name: Build APK
        run: bubblewrap build --keyPassword password --keystorePassword password
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: loki-x-prime-app.apk
          path: app-release-signed.apk

